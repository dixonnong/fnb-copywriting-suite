openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: generate
    description: AI copy generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate/description:
    post:
      operationId: generateDescription
      tags: [generate]
      summary: Generate cocktail menu description
      description: Uses Claude to generate an irresistible cocktail description from ingredients and tone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DescriptionInput"
      responses:
        "200":
          description: Generated description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescriptionResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DescriptionInput:
      type: object
      required:
        - ingredients
        - tone
      properties:
        ingredients:
          type: string
          description: The cocktail ingredients list
          minLength: 1
        tone:
          type: string
          enum: [Luxurious, Playful, Minimalist]
          description: The writing tone for the description
    DescriptionResult:
      type: object
      required:
        - description
      properties:
        description:
          type: string
          description: The AI-generated cocktail description
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
