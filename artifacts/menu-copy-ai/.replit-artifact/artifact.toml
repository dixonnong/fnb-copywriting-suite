kind = "web"
previewPath = "/"
title = "Menu Copy AI"
version = "1.0.0"
id = "artifacts/menu-copy-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23603

[services.development]
run = "pnpm --filter @workspace/menu-copy-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/menu-copy-ai", "run", "build" ]
publicDir = "artifacts/menu-copy-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23603"
BASE_PATH = "/"
